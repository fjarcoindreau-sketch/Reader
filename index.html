<script>
(function(){

const {html,render,useState,useEffect,useRef,useCallback,useMemo}=htmPreact;

// ─── Storage ─────────────────────────────────────────────────────────────────

// ─── Constants ───────────────────────────────────────────────────────────────

const TEXT_COLORS=[

  {name:"Cool White",color:"#D8DCE4",accent:"#7AA2D4"},

const FONTS=[
  {name:"Georgia",family:"Georgia, serif",cat:"serif"},
  {name:"Palatino",family:"'Palatino Linotype', Palatino, serif",cat:"serif"},
  {name:"EB Garamond",family:"'EB Garamond', serif",cat:"serif",gf:"EB+Garamond:wght@400;500;600"},
  {name:"Merriweather",family:"'Merriweather', serif",cat:"serif",gf:"Merriweather:wght@300;400;700"},
  {name:"Lora",family:"'Lora', serif",cat:"serif",gf:"Lora:wght@400;500;600;700"},
  {name:"Literata",family:"'Literata', serif",cat:"serif",gf:"Literata:opsz,wght@7..72,400;7..72,500;7..72,600"},
  {name:"Crimson Text",family:"'Crimson Text', serif",cat:"serif",gf:"Crimson+Text:wght@400;600;700"},
  {name:"Source Serif",family:"'Source Serif 4', serif",cat:"serif",gf:"Source+Serif+4:wght@400;500;600"},
  {name:"System Serif",family:"serif",cat:"serif"},
  {name:"Atkinson Hyperlegible",family:"'Atkinson Hyperlegible', sans-serif",cat:"sans",gf:"Atkinson+Hyperlegible:wght@400;700"},
  {name:"Lexend",family:"'Lexend', sans-serif",cat:"sans",gf:"Lexend:wght@300;400;500;600"},
  {name:"Open Sans",family:"'Open Sans', sans-serif",cat:"sans",gf:"Open+Sans:wght@400;500;600"},
  {name:"Nunito",family:"'Nunito', sans-serif",cat:"sans",gf:"Nunito:wght@400;500;600;700"},
  {name:"System Sans",family:"system-ui, sans-serif",cat:"sans"},
  {name:"OpenDyslexic",family:"'OpenDyslexic', sans-serif",cat:"access",gf:null,url:"https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/open-dyslexic-regular.css"},
  {name:"JetBrains Mono",family:"'JetBrains Mono', monospace",cat:"mono",gf:"JetBrains+Mono:wght@400;500;600"},
  {name:"System Mono",family:"ui-monospace, monospace",cat:"mono"},
];

var FONT_CATS={serif:"Serif",sans:"Sans-Serif",access:"Accessibility",mono:"Monospace"};

// ─── Epub Parser ─────────────────────────────────────────────────────────────

async function parseEpub(file){
  var zip=await JSZip.loadAsync(file);
  var containerXml=await zip.file("META-INF/container.xml")?.async("text");
  if(!containerXml)throw new Error("Invalid epub");
  var parser=new DOMParser();
  var cDoc=parser.parseFromString(containerXml,"text/xml");
  var opfPath=cDoc.querySelector("rootfile")?.getAttribute("full-path");
  if(!opfPath)throw new Error("Invalid epub");

  var opfDir=opfPath.includes("/")?opfPath.substring(0,opfPath.lastIndexOf("/")+1):"";
  var opfXml=await zip.file(opfPath)?.async("text");
  if(!opfXml)throw new Error("Invalid epub");
  var opfDoc=parser.parseFromString(opfXml,"text/xml");

  var getMeta=function(tag){var el=opfDoc.querySelector("metadata "+tag+", metadata *|"+tag);return el?.textContent?.trim()||""};
  var getMetaAttr=function(name){var els=opfDoc.querySelectorAll("metadata meta, metadata *|meta");for(var el of els){if(el.getAttribute("name")===name)return el.getAttribute("content")||""}return""};

  var title=getMeta("title")||file.name.replace(/\.epub$/i,"");
  var author=getMeta("creator")||"Unknown Author";
  var series=getMetaAttr("calibre:series");
  var seriesIndex=parseFloat(getMetaAttr("calibre:series_index"))||0;

  var coverUrl=null;
  var coverMeta=opfDoc.querySelector('metadata meta[name="cover"]');
  var coverId=coverMeta?.getAttribute("content");
  if(coverId){var ci=opfDoc.querySelector('manifest item[id="'+coverId+'"]');if(ci){var cf=zip.file(opfDir+ci.getAttribute("href"));if(cf)coverUrl=URL.createObjectURL(await cf.async("blob"))}}
  if(!coverUrl){var ci2=opfDoc.querySelector('manifest item[properties~="cover-image"]');if(ci2){var cf2=zip.file(opfDir+ci2.getAttribute("href"));if(cf2)coverUrl=URL.createObjectURL(await cf2.async("blob"))}}

  var spineItems=[...opfDoc.querySelectorAll("spine itemref")];
  var manifest={};
  opfDoc.querySelectorAll("manifest item").forEach(function(item){manifest[item.getAttribute("id")]=item.getAttribute("href")});

  var chapters=[];
  for(var itemref of spineItems){
    var href=manifest[itemref.getAttribute("idref")];
    if(!href)continue;
    var chapterPath=opfDir+href;
    var chapterFile=zip.file(chapterPath);
    if(!chapterFile)continue;
    var rawHtml=await chapterFile.async("text");
    var chDoc=parser.parseFromString(rawHtml,"text/html");
    var chTitle=chDoc.querySelector("title")?.textContent?.trim()||chDoc.querySelector("h1, h2, h3")?.textContent?.trim()||("Chapter "+(chapters.length+1));

    var imgs=chDoc.querySelectorAll("img, image");
    for(var img of imgs){
      var src=img.getAttribute("src")||img.getAttribute("xlink:href")||img.getAttributeNS("http://www.w3.org/1999/xlink","href");
      if(!src)continue;
      var imgPath=src;
      if(!src.startsWith("/")){var chDir=chapterPath.includes("/")?chapterPath.substring(0,chapterPath.lastIndexOf("/")+1):"";imgPath=chDir+src}else{imgPath=src.substring(1)}
      var parts=imgPath.split("/");var norm=[];
      for(var p of parts){if(p==="..")norm.pop();else if(p!==".")norm.push(p)}
      imgPath=norm.join("/");
      var imgFile=zip.file(imgPath);
      if(imgFile){var url=URL.createObjectURL(await imgFile.async("blob"));if(img.tagName==="image")img.setAttributeNS("http://www.w3.org/1999/xlink","href",url);else img.setAttribute("src",url)}
    }
    chapters.push({title:chTitle,content:chDoc.querySelector("body")?.innerHTML||rawHtml,href:href});
  }

  return{id:title+"-"+author+"-"+Date.now(),title:title,author:author,series:series,seriesIndex:seriesIndex,coverUrl:coverUrl,chapters:chapters,progress:0,currentChapter:0,bookmarks:[]};
}

// ─── Helpers ─────────────────────────────────────────────────────────────────

function getLastName(a){if(!a||a==="Unknown Author")return"Unknown";var p=a.trim().split(/\s+/);return p[p.length-1]}
function getDisplayName(a){if(!a||a==="Unknown Author")return"Unknown";var p=a.trim().split(/\s+/);if(p.length<=1)return a;return p[p.length-1]+", "+p.slice(0,-1).join(" ")}
function getOrpIndex(w){var l=w.length;if(l<=1)return 0;if(l<=3)return 0;if(l<=5)return 1;if(l<=9)return 2;if(l<=13)return 3;return 4}
function extractWords(h){var d=document.createElement("div");d.innerHTML=h;return(d.textContent||"").split(/\s+/).filter(function(w){return w.length>0})}

// ─── App Component ───────────────────────────────────────────────────────────

function EpubReader(){
  var booksState=useState([]);var books=booksState[0];var setBooks=booksState[1];
  var searchState=useState("");var searchQuery=searchState[0];var setSearchQuery=searchState[1];
  var viewState=useState("grid");var viewMode=viewState[0];var setViewMode=viewState[1];
  var authState=useState(new Set());var openAuthors=authState[0];var setOpenAuthors=authState[1];
  var scaleState=useState(1.0);var libScale=scaleState[0];var setLibScale=scaleState[1];
  var loadState=useState(false);var loading=loadState[0];var setLoading=loadState[1];
  var loadMsgState=useState("");var loadingMsg=loadMsgState[0];var setLoadingMsg=loadMsgState[1];

  var bookState=useState(null);var currentBook=bookState[0];var setCurrentBook=bookState[1];
  var chapState=useState(0);var currentChapter=chapState[0];var setCurrentChapter=chapState[1];
  var tcState=useState(0);var textColorIdx=tcState[0];var setTextColorIdx=tcState[1];
  var bgState=useState(2);var bgColorIdx=bgState[0];var setBgColorIdx=bgState[1];
  var fsState=useState(18);var fontSize=fsState[0];var setFontSize=fsState[1];
  var lhState=useState(1.7);var lineHeight=lhState[0];var setLineHeight=lhState[1];
  var ffState=useState("Literata");var fontFamily=ffState[0];var setFontFamily=ffState[1];
  var ffiltState=useState("all");var fontFilter=ffiltState[0];var setFontFilter=ffiltState[1];
  var tocState=useState(false);var showToc=tocState[0];var setShowToc=tocState[1];
  var setState=useState(false);var showSettings=setState[0];var setShowSettings=setState[1];
  var pmState=useState("scroll");var pageMode=pmState[0];var setPageMode=pmState[1];
  var cpState=useState(0);var currentPage=cpState[0];var setCurrentPage=cpState[1];
  var tpState=useState(1);var totalPages=tpState[0];var setTotalPages=tpState[1];

  var smState=useState(false);var speedMode=smState[0];var setSpeedMode=smState[1];
  var swState=useState(350);var speedWpm=swState[0];var setSpeedWpm=swState[1];
  var spState=useState(false);var speedPlaying=spState[0];var setSpeedPlaying=spState[1];
  var siState=useState(0);var speedWordIdx=siState[0];var setSpeedWordIdx=siState[1];
  var swdState=useState([]);var speedWords=swdState[0];var setSpeedWords=swdState[1];

  var contentRef=useRef(null);
  var fileInputRef=useRef(null);
  var speedTimerRef=useRef(null);
  var pageContentRef=useRef(null);
  var touchStartRef=useRef(null);

  var tc=TEXT_COLORS[textColorIdx]||TEXT_COLORS[0];
  var bc=BG_COLORS[bgColorIdx]||BG_COLORS[2];
  var accent=tc.accent;
  var fg=tc.color;
  var bg=bc.bg;
  var currentFont=FONTS.find(function(f){return f.name===fontFamily})||FONTS[0];

  // ─── Persistence ───────────────────────────────────────────────────────

  useEffect(function(){
    try{
      var s=store.get("epub-settings-v3");
      if(s&&s.value){
        var d=JSON.parse(s.value);
        if(d.textColorIdx!=null)setTextColorIdx(d.textColorIdx);
        if(d.bgColorIdx!=null)setBgColorIdx(d.bgColorIdx);
        if(d.fontSize)setFontSize(d.fontSize);
        if(d.lineHeight)setLineHeight(d.lineHeight);
        if(d.fontFamily)setFontFamily(d.fontFamily);
        if(d.viewMode)setViewMode(d.viewMode);
        if(d.pageMode)setPageMode(d.pageMode);
        if(d.libScale)setLibScale(d.libScale);
        if(d.speedWpm)setSpeedWpm(d.speedWpm);
      }
    }catch(e){}
    try{
      var lib=store.get("epub-library");
      if(lib&&lib.value){
        var data=JSON.parse(lib.value);
        setBooks(data.map(function(b){return Object.assign({},b,{chapters:[],coverUrl:null,needsReload:true})}));
      }
    }catch(e){}
  },[]);

  useEffect(function(){
    var timer=setTimeout(function(){
      try{store.set("epub-settings-v3",JSON.stringify({textColorIdx:textColorIdx,bgColorIdx:bgColorIdx,fontSize:fontSize,lineHeight:lineHeight,fontFamily:fontFamily,viewMode:viewMode,pageMode:pageMode,libScale:libScale,speedWpm:speedWpm}))}catch(e){}
    },500);
    return function(){clearTimeout(timer)};
  },[textColorIdx,bgColorIdx,fontSize,lineHeight,fontFamily,viewMode,pageMode,libScale,speedWpm]);

  useEffect(function(){
    if(books.length===0)return;
    var timer=setTimeout(function(){
      try{
        var meta=books.map(function(b){return{id:b.id,title:b.title,author:b.author,series:b.series,seriesIndex:b.seriesIndex,progress:b.progress,currentChapter:b.currentChapter,bookmarks:b.bookmarks}});
        store.set("epub-library",JSON.stringify(meta));
      }catch(e){}
    },500);
    return function(){clearTimeout(timer)};
  },[books]);

  // ─── Font loading ──────────────────────────────────────────────────────

  useEffect(function(){
    var font=FONTS.find(function(f){return f.name===fontFamily});
    if(!font)return;
    if(font.gf){
      var id="gf-"+fontFamily.replace(/\s/g,"-");
      if(!document.getElementById(id)){var link=document.createElement("link");link.id=id;link.rel="stylesheet";link.href="https://fonts.googleapis.com/css2?family="+font.gf+"&display=swap";document.head.appendChild(link)}
    }
    if(font.url){
      var id2="cf-"+fontFamily.replace(/\s/g,"-");
      if(!document.getElementById(id2)){var link2=document.createElement("link");link2.id=id2;link2.rel="stylesheet";link2.href=font.url;document.head.appendChild(link2)}
    }
  },[fontFamily]);

  // ─── Auto-open folders on search ───────────────────────────────────────

  useEffect(function(){
    if(!searchQuery.trim())return;
    var q=searchQuery.toLowerCase();
    var matching=new Set();
    books.forEach(function(b){if(b.title.toLowerCase().includes(q)||b.author.toLowerCase().includes(q)||(b.series&&b.series.toLowerCase().includes(q)))matching.add(b.author)});
    if(matching.size>0)setOpenAuthors(function(prev){return new Set([...prev,...matching])});
  },[searchQuery,books]);

  // ─── Speed reader timer ────────────────────────────────────────────────

  useEffect(function(){
    if(speedPlaying&&speedWords.length>0){
      var interval=60000/speedWpm;
      speedTimerRef.current=setInterval(function(){
        setSpeedWordIdx(function(prev){if(prev>=speedWords.length-1){setSpeedPlaying(false);return prev}return prev+1});
      },interval);
      return function(){clearInterval(speedTimerRef.current)};
    }else{clearInterval(speedTimerRef.current)}
  },[speedPlaying,speedWpm,speedWords.length]);

  // ─── Page calculation ──────────────────────────────────────────────────

  useEffect(function(){
    if(pageMode!=="page"||!pageContentRef.current||!currentBook)return;
    var el=pageContentRef.current;
    var recalc=function(){requestAnimationFrame(function(){var pages=Math.max(1,Math.ceil(el.scrollWidth/el.clientWidth));setTotalPages(pages);setCurrentPage(0)})};
    recalc();
    var obs=new ResizeObserver(recalc);obs.observe(el);
    return function(){obs.disconnect()};
  },[pageMode,currentChapter,currentBook,fontSize,lineHeight,fontFamily]);

  // ─── Grouped books ────────────────────────────────────────────────────

  var filteredBooks=useMemo(function(){
    if(!searchQuery.trim())return books;
    var q=searchQuery.toLowerCase();
    return books.filter(function(b){return b.title.toLowerCase().includes(q)||b.author.toLowerCase().includes(q)||(b.series&&b.series.toLowerCase().includes(q))});
  },[books,searchQuery]);

  var groupedBooks=useMemo(function(){
    var groups={};
    filteredBooks.forEach(function(b){if(!groups[b.author])groups[b.author]=[];groups[b.author].push(b)});
    Object.values(groups).forEach(function(arr){arr.sort(function(a,b){
      var sa=(a.series||"").toLowerCase(),sb=(b.series||"").toLowerCase();
      if(sa!==sb)return sa.localeCompare(sb);
      if(a.seriesIndex!==b.seriesIndex)return a.seriesIndex-b.seriesIndex;
      return a.title.localeCompare(b.title);
    })});
    return Object.entries(groups).sort(function(a,b){return getLastName(a[0]).toLowerCase().localeCompare(getLastName(b[0]).toLowerCase())});
  },[filteredBooks]);

  var openAllAuthors=useCallback(function(){setOpenAuthors(new Set(groupedBooks.map(function(g){return g[0]})))},[groupedBooks]);
  var closeAllAuthors=useCallback(function(){setOpenAuthors(new Set())},[]);

  // ─── File handling ─────────────────────────────────────────────────────

  var handleFiles=useCallback(async function(files){
    setLoading(true);
    var epubs=[...files].filter(function(f){return f.name.endsWith(".epub")});
    var newBooks=[];
    for(var i=0;i<epubs.length;i++){
      setLoadingMsg("Parsing "+(i+1)+"/"+epubs.length+": "+epubs[i].name);
      try{
        var book=await parseEpub(epubs[i]);
        var existing=books.find(function(b){return b.title===book.title&&b.author===book.author});
        if(existing){book.progress=existing.progress;book.currentChapter=existing.currentChapter;book.bookmarks=existing.bookmarks;book.id=existing.id}
        newBooks.push(book);
      }catch(e){console.error("Failed:",epubs[i].name,e)}
    }
    setBooks(function(prev){var updated=[...prev];newBooks.forEach(function(nb){var idx=updated.findIndex(function(b){return b.id===nb.id});if(idx>=0)updated[idx]=nb;else updated.push(nb)});return updated});
    setLoading(false);setLoadingMsg("");
  },[books]);

  // ─── Book operations ───────────────────────────────────────────────────

  var openBook=useCallback(function(book){
    if(book.needsReload)return;
    setCurrentBook(book);setCurrentChapter(book.currentChapter||0);setCurrentPage(0);
    setShowToc(false);setShowSettings(false);setSpeedMode(false);
  },[]);

  var closeBook=useCallback(function(){setCurrentBook(null);setSpeedMode(false);setSpeedPlaying(false);setShowToc(false);setShowSettings(false)},[]);
  var removeBook=useCallback(function(id){setBooks(function(prev){return prev.filter(function(b){return b.id!==id})})},[]);

  var goToChapter=useCallback(function(idx){
    if(!currentBook||idx<0||idx>=currentBook.chapters.length)return;
    setCurrentChapter(idx);setCurrentPage(0);
    if(contentRef.current)contentRef.current.scrollTop=0;
    setBooks(function(prev){return prev.map(function(b){return b.id===currentBook.id?Object.assign({},b,{currentChapter:idx,progress:Math.round((idx/Math.max(1,b.chapters.length-1))*100)}):b})});
  },[currentBook]);

  var toggleBookmark=useCallback(function(){
    if(!currentBook)return;
    var update=function(b){if(b.id!==currentBook.id)return b;var bm=b.bookmarks||[];return Object.assign({},b,{bookmarks:bm.includes(currentChapter)?bm.filter(function(x){return x!==currentChapter}):[...bm,currentChapter]})};
    setBooks(function(prev){return prev.map(update)});
    setCurrentBook(function(prev){return prev?update(prev):prev});
  },[currentBook,currentChapter]);

  // ─── Page flip ─────────────────────────────────────────────────────────

  var nextPage=useCallback(function(){
    if(currentPage<totalPages-1)setCurrentPage(function(p){return p+1});
    else if(currentBook&&currentChapter<currentBook.chapters.length-1)goToChapter(currentChapter+1);
  },[currentPage,totalPages,currentBook,currentChapter,goToChapter]);

  var prevPage=useCallback(function(){
    if(currentPage>0)setCurrentPage(function(p){return p-1});
    else if(currentChapter>0){
      goToChapter(currentChapter-1);
      setTimeout(function(){if(pageContentRef.current){var pages=Math.max(1,Math.ceil(pageContentRef.current.scrollWidth/pageContentRef.current.clientWidth));setTotalPages(pages);setCurrentPage(pages-1)}},100);
    }
  },[currentPage,currentChapter,goToChapter]);

  var handleTouchStart=useCallback(function(e){if(pageMode==="page")touchStartRef.current={x:e.touches[0].clientX}},[pageMode]);
  var handleTouchEnd=useCallback(function(e){
    if(pageMode!=="page"||!touchStartRef.current)return;
    var dx=e.changedTouches[0].clientX-touchStartRef.current.x;
    if(Math.abs(dx)>50){if(dx<0)nextPage();else prevPage()}
    touchStartRef.current=null;
  },[pageMode,nextPage,prevPage]);
  var handlePageTap=useCallback(function(e){
    if(pageMode!=="page")return;
    var rect=e.currentTarget.getBoundingClientRect();var x=e.clientX-rect.left;
    if(x<rect.width/3)prevPage();else if(x>rect.width*2/3)nextPage();
  },[pageMode,prevPage,nextPage]);

  var startSpeedRead=useCallback(function(){
    if(!currentBook)return;
    var words=[];for(var i=currentChapter;i<currentBook.chapters.length;i++)words=words.concat(extractWords(currentBook.chapters[i].content));
    setSpeedWords(words);setSpeedWordIdx(0);setSpeedMode(true);setSpeedPlaying(false);
  },[currentBook,currentChapter]);

  var toggleAuthor=useCallback(function(author){setOpenAuthors(function(prev){var n=new Set(prev);if(n.has(author))n.delete(author);else n.add(author);return n})},[]);

  var handleScroll=useCallback(function(){
    if(pageMode!=="scroll"||!contentRef.current||!currentBook)return;
    var el=contentRef.current;
    var pct=el.scrollHeight>el.clientHeight?el.scrollTop/(el.scrollHeight-el.clientHeight):1;
    var progress=Math.round(((currentChapter+pct)/currentBook.chapters.length)*100);

              <div class="speed-btns">
                <button class="speed-b" onClick=${function(){setSpeedWordIdx(0)}}>⟲</button>
                <button class="speed-b" onClick=${function(){setSpeedWordIdx(Math.max(0,speedWordIdx-25))}}>⏪</button>
                <button class="speed-b play" onClick=${function(){setSpeedPlaying(!speedPlaying)}}>${speedPlaying?"⏸":"▶"}</button>
                <button class="speed-b" onClick=${function(){setSpeedWordIdx(Math.min(speedWords.length-1,speedWordIdx+25))}}>⏩</button>
                <button class="speed-b" onClick=${function(){setSpeedWordIdx(Math.min(speedWords.length-1,speedWordIdx+100))}}>⏭</button>
              </div>
              <div class="speed-bar" onClick=${function(e){var r=e.currentTarget.getBoundingClientRect();setSpeedWordIdx(Math.floor(((e.clientX-r.left)/r.width)*speedWords.length))}}>
                <div class="speed-bar-fill" style=${"width:"+(speedWords.length>0?(speedWordIdx/speedWords.length)*100:0)+"%"}></div>
              </div>
              <div class="speed-info">
                <span>${speedWordIdx+1} / ${speedWords.length}</span>
                <span>${speedWords.length>0?Math.round((speedWordIdx/speedWords.length)*100):0}%</span>
                <span>${speedWords.length>0?Math.ceil((speedWords.length-speedWordIdx)/speedWpm):0} min left</span>
              </div>
            </div>
          </div>
        `:null}
      </div>
    </div>`;
  }

  // ─── Library ───────────────────────────────────────────────────────────

  return html`<div class="app" style=${"--sc:"+libScale}>
    <style>${css}</style>

    <div class="lib-head">
      <div class="lib-top">
        <div class="lib-logo">📚 Library</div>
        <div class="lib-actions">
          <button class="btn" onClick=${openAllAuthors} title="Expand all">⟱</button>
          <button class="btn" onClick=${closeAllAuthors} title="Collapse all">⟰</button>
        </div>
      </div>
      <div class="lib-bar">
        <input class="lib-search" placeholder="Search books…" value=${searchQuery} onInput=${function(e){setSearchQuery(e.target.value)}} />
        <button class=${"btn"+(viewMode==="grid"?" active":"")} onClick=${function(){setViewMode("grid")}}>▦</button>
        <button class=${"btn"+(viewMode==="list"?" active":"")} onClick=${function(){setViewMode("list")}}>☰</button>
        <div class="scale-wrap">
          <span>A</span>
          <input type="range" min="0.6" max="1.6" step="0.05" value=${libScale} onInput=${function(e){setLibScale(+e.target.value)}} />
          <span style="font-size:15px">A</span>
        </div>
      </div>
    </div>

    <div class="lib-body">
      ${groupedBooks.map(function(group){
        var author=group[0];var authorBooks=group[1];
        var isOpen=openAuthors.has(author);
        var displayName=getDisplayName(author);
        var seriesGroups={};
        authorBooks.forEach(function(b){var k=b.series||"__none__";if(!seriesGroups[k])seriesGroups[k]=[];seriesGroups[k].push(b)});
        var seriesOrder=Object.keys(seriesGroups).sort(function(a,b){if(a==="__none__")return 1;if(b==="__none__")return -1;return a.localeCompare(b)});

        return html`<div class="folder">
          <div class="folder-hd" onClick=${function(){toggleAuthor(author)}}>
            <span class="folder-ico">${isOpen?"📂":"📁"}</span>
            <div class="folder-info">
              <div class="folder-last">${displayName}</div>
            </div>
            <span class="folder-badge">${authorBooks.length}</span>
            <span class=${"folder-chev"+(isOpen?" open":"")}>›</span>
          </div>
          ${isOpen?html`
            <div class="folder-body">
              ${seriesOrder.map(function(sk){
                var sb=seriesGroups[sk];
                return html`<div>
                  ${sk!=="__none__"?html`<div class="series-lbl">${sk}</div>`:null}
                  ${sk==="__none__"&&seriesOrder.length>1?html`<div class="series-lbl">Standalone</div>`:null}
                  ${viewMode==="grid"?html`
                    <div class="b-grid">
                      ${sb.map(function(book){return html`
                        <div class=${"b-card"+(book.needsReload?" stale":"")} onClick=${function(){openBook(book)}}>
                          <div class="b-cover">
                            ${book.coverUrl?html`<img src=${book.coverUrl} alt="" />`:html`<div class="b-cover-ph">📖</div>`}
                            ${book.progress>0?html`<div class="b-prog"><div class="b-prog-fill" style=${"width:"+book.progress+"%"}></div></div>`:null}
                          </div>
                          <div class="b-meta">
                            <div class="b-title">${book.title}</div>
                            ${book.series?html`<div class="b-series">${book.series} ${book.seriesIndex?("#"+book.seriesIndex):""}</div>`:null}
                          </div>
                          ${book.needsReload?html`<div style="padding:3px 7px;font-size:9px;color:${accent};text-align:center">Re-upload needed</div>`:null}
                          <button class="b-rm" onClick=${function(e){e.stopPropagation();removeBook(book.id)}}>✕</button>
                        </div>
                      `})}
                    </div>
                  `:html`
                    <div class="b-list">
                      ${sb.map(function(book){return html`
                        <div class="b-row" onClick=${function(){openBook(book)}} style=${"opacity:"+(book.needsReload?0.4:1)}>
                          <div class="b-thumb">
                            ${book.coverUrl?html`<img src=${book.coverUrl} alt="" />`:html`<span style="font-size:14px;opacity:0.2">📖</span>`}
                          </div>
                          <div style="flex:1;min-width:0">
                            <div style="font-size:calc(13px * ${libScale});font-weight:500;color:${fg}D0">${book.title}</div>
                            ${book.series?html`<div style="font-size:calc(11px * ${libScale});color:${accent}">${book.series} ${book.seriesIndex?("#"+book.seriesIndex):""}</div>`:null}
                            ${book.needsReload?html`<div style="font-size:9px;color:${accent}">Re-upload needed</div>`:null}
                          </div>
                          ${book.progress>0?html`<span style="font-size:11px;color:${fg}50">${book.progress}%</span>`:null}
                        </div>
                      `})}
                    </div>
                  `}
                </div>`;
              })}
            </div>
          `:null}
        </div>`;
      })}

      <div class="upload" onClick=${function(){fileInputRef.current&&fileInputRef.current.click()}}
        onDragOver=${function(e){e.preventDefault()}} onDrop=${function(e){e.preventDefault();handleFiles(e.dataTransfer.files)}}>
        <div class="upload-ico">📥</div>
        <div class="upload-txt"><strong>Tap to upload</strong> or drag & drop<br />.epub files from Calibre</div>
        <input ref=${fileInputRef} type="file" multiple accept=".epub" style="display:none"
          onChange=${function(e){if(e.target.files&&e.target.files.length)handleFiles(e.target.files)}} />
      </div>

      ${books.length===0?html`
        <div style="text-align:center;padding:40px 20px;color:${fg}40">
          <div style="font-size:44px;margin-bottom:12px">📚</div>
          <div style="font-size:15px;font-weight:500;color:${fg}70;margin-bottom:6px">Your library is empty</div>
          <div style="font-size:13px">Upload epub files from Calibre to get started</div>
        </div>
      `:null}
    </div>
  </div>`;
}

// ─── Mount ───────────────────────────────────────────────────────────────────

render(html`<${EpubReader} />`,document.getElementById("app"));

})();
</script>
</body>
</html>
